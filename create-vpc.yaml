- name: create VPC
  hosts: localhost
  connection: local
  vars: 
    vpc_id: "{{ vpc.vpc.id }}"
    igw_id: "{{ igw.gateway_id }}"          
    region: us-east-1
    # Define the tiers and zones mapping
    subnets_config:
      - { tier: 'web', az: 'a', cidr: '10.0.1.0/24', public: yes }
      - { tier: 'app', az: 'a', cidr: '10.0.2.0/24', public: no }
      - { tier: 'db',  az: 'a', cidr: '10.0.3.0/24', public: no }
      - { tier: 'web', az: 'b', cidr: '10.0.4.0/24', public: yes }
      - { tier: 'app', az: 'b', cidr: '10.0.5.0/24', public: no }
      - { tier: 'db',  az: 'b', cidr: '10.0.6.0/24', public: no }
    # public_subnets: ["subnet-web-a-id", "subnet-web-b-id"]
    # private_subnets: ["subnet-app-a-id", "subnet-app-b-id", "subnet-db-a-id", "subnet-db-b-id"]

  tasks:  
  tasks:
    - name: ansible to install boto3 and botocore
      ansible.builtin.pip:
        name:
        - boto3
        - botocore
        executable: pip3.9

    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: my-vpc
        cidr_block: 10.0.0.0/16
        region: us-east-1
      register: vpc

    # - name: print the output
    #   ansible.builtin.debug:
    #     msg: "{{ vpc }}"

    - name: Create and attach Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"  # Use the ID registered from the VPC creation task
        state: present
        tags:
          Name: my-igw
      register: igw

    # - name: print the output
    #   ansible.builtin.debug:
    #     msg: "{{ igw }}"  
      
    - name: Create 6 Subnets for 3-Tier Architecture
      amazon.aws.ec2_vpc_subnet:
        region: "{{ region }}"
        vpc_id: "{{ vpc_id }}"
        az: "{{ region }}{{ item.az }}"
        cidr: "{{ item.cidr }}"
        map_public: "{{ item.public }}"
        tags:
          Name: "{{ item.tier | capitalize }}-Subnet-{{ item.az }}"
          Tier: "{{ item.tier }}"
      loop: "{{ subnets_config }}"
      register: subnets_config

    # - name: print the output
    #   ansible.builtin.debug:
    #     msg: "{{ subnets_config }}"  

    - name: Create Public Route Table (Web Tier)
      amazon.aws.ec2_vpc_route_table:
          vpc_id: "{{ vpc_id }}"
          region: "{{ region }}"
          tags:
            Name: Public-RT
          subnets: "{{ subnets_config.results | selectattr('item.tier', 'equalto', 'web') | map(attribute='subnet.id') | list }}"
          routes:
            - dest: 0.0.0.0/0
              gateway_id: "{{ igw_id }}"
      register: public_rt
  
    - name: Create Private Route Table (App & DB Tiers)
      amazon.aws.ec2_vpc_route_table:
          vpc_id: "{{ vpc_id }}"
          region: "{{ region }}"
          tags:
            Name: Private-RT
          subnets: "{{ subnets_config.results | rejectattr('item.tier', 'equalto', 'web') | map(attribute='subnet.id') | list }}"
      register: private_rt
      
      # subnets: "{{ subnets_config.results | rejectattr('item.tier', 'equalto', ['app', 'db']) | map(attribute='subnet.id') | list }}"
      # register: private_rt      
  
    - name: Create Web Security Group
      amazon.aws.ec2_security_group:
        name: web-sg
        description: Allow HTTP from everywhere
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            from_port: 80
            to_port: 80
            cidr_ip: 0.0.0.0/0
      register: web_sg

    - name: Create App Security Group
      amazon.aws.ec2_security_group:
        name: app-sg
        description: Allow traffic from Web Tier
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            from_port: 8080 # Adjust based on your app port
            to_port: 8080
            group_id: "{{ web_sg.group_id }}" # Links to Web SG
      register: app_sg

    - name: Create Database Security Group
      amazon.aws.ec2_security_group:
        name: db-sg
        description: Allow traffic from App Tier
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            from_port: 3306 # MySQL/Aurora port
            to_port: 3306
            group_id: "{{ app_sg.group_id }}" # Links to App SG
      register: db_sg
